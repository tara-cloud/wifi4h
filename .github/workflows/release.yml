name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: self-hosted
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.value }}
      name: ${{ steps.meta.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Read library name
        id: meta
        run: |
          NAME=$(python3 -c "import json; print(json.load(open('library.json'))['name'])")
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            --latest

  publish:
    name: Package and publish to Pocket
    runs-on: self-hosted
    needs: release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Package library
        run: |
          NAME=${{ needs.release.outputs.name }}
          VERSION=${{ needs.release.outputs.version }}
          zip -r "${NAME}-${VERSION}.zip" src/ library.json VERSION CHANGELOG.md

      - name: Ensure Pocket repo exists
        run: |
          NAME=${{ needs.release.outputs.name }}
          DESCRIPTION=$(python3 -c "import json; print(json.load(open('library.json'))['description'])")
          curl -s -o /dev/null -X POST \
            "${{ secrets.POCKET_BASE_URL }}/api/repos" \
            -H "x-pocket-token: ${{ secrets.POCKET_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${NAME}\",\"description\":\"${DESCRIPTION}\",\"repoType\":\"generic\",\"isPublic\":true}" \
            || true

      - name: Upload artifact to Pocket
        run: |
          NAME=${{ needs.release.outputs.name }}
          VERSION=${{ needs.release.outputs.version }}
          ARTIFACT="${NAME}-${VERSION}.zip"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.POCKET_BASE_URL }}/api/repos/${NAME}/artifacts" \
            -H "x-pocket-token: ${{ secrets.POCKET_API_KEY }}" \
            -F "file=@${ARTIFACT}" \
            -F "name=${NAME}" \
            -F "version=${VERSION}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$HTTP_CODE" = "409" ]; then
            echo "Artifact ${NAME}@${VERSION} already exists in Pocket, skipping."
            exit 0
          fi
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Uploaded ${NAME}@${VERSION} successfully."
