name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  validate:
    name: Validate library
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Check library.json
        run: |
          VERSION=$(cat VERSION)
          LIB_VERSION=$(python3 -c "import json; print(json.load(open('library.json'))['version'])")
          if [ "$VERSION" != "$LIB_VERSION" ]; then
            echo "VERSION ($VERSION) does not match library.json version ($LIB_VERSION)"
            exit 1
          fi
          echo "Version check passed: $VERSION"
